<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Login - TechVault</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --neon-cyan: #00d4ff;
            --neon-pink: #ff006e;
            --neon-purple: #b537f2;
            --neon-green: #39ff14;
            --dark-bg: #0a0e27;
            --dark-secondary: #16213e;
            --text-primary: #ffffff;
            --text-secondary: #8b92b2;
            --grid-color: rgba(0, 212, 255, 0.05);
        }

        body {
            font-family: 'JetBrains Mono', monospace;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #2d1b4e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            color: var(--text-primary);
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32"><circle cx="16" cy="16" r="4" fill="%2300d4ff"/><circle cx="16" cy="16" r="14" fill="none" stroke="%2300d4ff" stroke-width="1" opacity="0.5"/></svg>') 16 16, auto;
        }

        /* Grid background pattern */
        .grid-background {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(0deg, var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
            opacity: 0.3;
        }

        /* Animated scan lines */
        .scan-lines {
            position: absolute;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.15),
                rgba(0, 0, 0, 0.15) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 1;
            animation: scanMove 8s linear infinite;
        }

        @keyframes scanMove {
            0% {
                transform: translateY(0);
            }
            100% {
                transform: translateY(10px);
            }
        }

        /* Floating particles/orbs */
        .particle {
            position: absolute;
            pointer-events: none;
            border-radius: 50%;
            z-index: 1;
        }

        .particle-1 {
            width: 80px;
            height: 80px;
            background: radial-gradient(circle, rgba(0, 212, 255, 0.3) 0%, transparent 70%);
            top: 10%;
            left: 10%;
            animation: float 8s ease-in-out infinite;
            filter: blur(20px);
        }

        .particle-2 {
            width: 120px;
            height: 120px;
            background: radial-gradient(circle, rgba(255, 0, 110, 0.2) 0%, transparent 70%);
            top: 60%;
            right: 5%;
            animation: float 10s ease-in-out infinite reverse;
            filter: blur(30px);
        }

        .particle-3 {
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, rgba(181, 55, 242, 0.25) 0%, transparent 70%);
            bottom: 10%;
            left: 5%;
            animation: float 12s ease-in-out infinite;
            filter: blur(25px);
        }

        @keyframes float {
            0%, 100% {
                transform: translate(0, 0);
            }
            33% {
                transform: translate(30px, -30px);
            }
            66% {
                transform: translate(-20px, 20px);
            }
        }

        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 450px;
        }

        /* Corner brackets decoration */
        .corner-bracket {
            position: absolute;
            width: 30px;
            height: 30px;
            border: 2px solid var(--neon-cyan);
            pointer-events: none;
        }

        .bracket-tl {
            top: -15px;
            left: -15px;
            border-right: none;
            border-bottom: none;
            box-shadow: 0 0 20px var(--neon-cyan);
        }

        .bracket-tr {
            top: -15px;
            right: -15px;
            border-left: none;
            border-bottom: none;
            box-shadow: 0 0 20px var(--neon-cyan);
        }

        .bracket-bl {
            bottom: -15px;
            left: -15px;
            border-right: none;
            border-top: none;
            box-shadow: 0 0 20px var(--neon-cyan);
        }

        .bracket-br {
            bottom: -15px;
            right: -15px;
            border-left: none;
            border-top: none;
            box-shadow: 0 0 20px var(--neon-cyan);
        }

        .login-card {
            background: rgba(22, 33, 62, 0.8);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 8px;
            padding: 50px 40px;
            position: relative;
            backdrop-filter: blur(10px);
            box-shadow: 
                0 0 20px rgba(0, 212, 255, 0.1),
                inset 0 0 30px rgba(0, 212, 255, 0.05),
                0 8px 32px rgba(0, 0, 0, 0.3);
            animation: cardGlow 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes cardGlow {
            from {
                opacity: 0;
                transform: translateY(40px);
                box-shadow: 
                    0 0 0px rgba(0, 212, 255, 0),
                    inset 0 0 0px rgba(0, 212, 255, 0);
            }
            to {
                opacity: 1;
                transform: translateY(0);
                box-shadow: 
                    0 0 20px rgba(0, 212, 255, 0.1),
                    inset 0 0 30px rgba(0, 212, 255, 0.05),
                    0 8px 32px rgba(0, 0, 0, 0.3);
            }
        }

        .header {
            margin-bottom: 40px;
            animation: fadeInDown 0.8s ease-out 0.1s both;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 32px;
            font-weight: 900;
            letter-spacing: 4px;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 16px;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
            filter: drop-shadow(0 0 10px rgba(0, 212, 255, 0.3));
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 26px;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 8px;
            color: var(--text-primary);
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 13px;
            color: var(--text-secondary);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .form-group {
            margin-bottom: 24px;
            animation: fadeInUp 0.8s ease-out both;
        }

        .form-group:nth-child(1) { animation-delay: 0.2s; }
        .form-group:nth-child(2) { animation-delay: 0.25s; }
        .form-group:nth-child(3) { animation-delay: 0.3s; }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: var(--neon-cyan);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .input-wrapper {
            position: relative;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(10, 14, 39, 0.5);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            color: var(--text-primary);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            outline: none;
            position: relative;
            z-index: 2;
            letter-spacing: 0.5px;
        }

        input::placeholder {
            color: rgba(139, 146, 178, 0.5);
        }

        /* Glowing border effect on focus */
        input:focus {
            border-color: var(--neon-cyan);
            background: rgba(10, 14, 39, 0.9);
            box-shadow: 
                0 0 20px rgba(0, 212, 255, 0.4),
                0 0 40px rgba(0, 212, 255, 0.2),
                inset 0 0 20px rgba(0, 212, 255, 0.1);
            transform: translateY(-2px);
        }

        input:focus::placeholder {
            color: rgba(139, 146, 178, 0.3);
        }

        .input-glow {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 4px;
            background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.1), transparent);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        input:focus ~ .input-glow {
            opacity: 1;
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% {
                transform: translateX(-100%);
            }
            100% {
                transform: translateX(100%);
            }
        }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            font-size: 12px;
            animation: fadeIn 0.8s ease-out 0.35s both;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: var(--neon-cyan);
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
        }

        .forgot-link {
            color: var(--neon-pink);
            text-decoration: none;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .forgot-link:hover {
            color: var(--neon-cyan);
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-pink));
            color: var(--dark-bg);
            border: none;
            border-radius: 4px;
            font-family: 'Orbitron', sans-serif;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 2px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 
                0 0 20px rgba(0, 212, 255, 0.5),
                0 0 40px rgba(255, 0, 110, 0.3),
                0 8px 16px rgba(0, 0, 0, 0.4);
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
            animation: fadeIn 0.8s ease-out 0.4s both;
        }

        .btn-login::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.6s ease;
            z-index: 1;
        }

        .btn-login:hover::before {
            left: 100%;
        }

        .btn-login:hover {
            transform: translateY(-4px);
            box-shadow: 
                0 0 30px rgba(0, 212, 255, 0.7),
                0 0 60px rgba(255, 0, 110, 0.5),
                0 12px 24px rgba(0, 0, 0, 0.5);
            letter-spacing: 3px;
        }

        .btn-login:active {
            transform: translateY(-2px);
        }

        .signup-link {
            text-align: center;
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 30px;
            animation: fadeIn 0.8s ease-out 0.45s both;
        }

        .signup-link a {
            color: var(--neon-green);
            text-decoration: none;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .signup-link a:hover {
            color: var(--neon-cyan);
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
        }

        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.3), transparent);
            margin: 30px 0;
            position: relative;
            animation: fadeIn 0.8s ease-out 0.5s both;
        }

        .divider-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #16213e 0%, #1a1f3a 100%);
            padding: 0 12px;
            font-size: 11px;
            color: var(--neon-pink);
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .social-login {
            display: flex;
            gap: 12px;
            animation: fadeIn 0.8s ease-out 0.55s both;
        }

        .social-btn {
            flex: 1;
            padding: 14px;
            border: 1px solid rgba(0, 212, 255, 0.3);
            background: rgba(10, 14, 39, 0.5);
            border-radius: 4px;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            color: var(--neon-cyan);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        .social-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.2), rgba(255, 0, 110, 0.2));
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: -1;
        }

        .social-btn:hover {
            border-color: var(--neon-pink);
            box-shadow: 
                0 0 15px rgba(255, 0, 110, 0.5),
                0 0 30px rgba(0, 212, 255, 0.3);
            transform: translateY(-3px);
            color: var(--neon-pink);
        }

        .social-btn:hover::before {
            opacity: 1;
        }

        /* Status indicator */
        .status {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 12px;
            height: 12px;
            background: var(--neon-green);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--neon-green), 0 0 30px rgba(57, 255, 20, 0.5);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 0 15px var(--neon-green), 0 0 30px rgba(57, 255, 20, 0.5);
            }
            50% {
                box-shadow: 0 0 25px var(--neon-green), 0 0 50px rgba(57, 255, 20, 0.8);
            }
        }

        .success-message {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(57, 255, 20, 0.1);
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            padding: 16px 24px;
            border-radius: 4px;
            display: none;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            z-index: 1000;
            animation: slideUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.4);
            letter-spacing: 1px;
            font-size: 12px;
            text-transform: uppercase;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="grid-background"></div>
    <div class="scan-lines"></div>
    
    <div class="particle particle-1"></div>
    <div class="particle particle-2"></div>
    <div class="particle particle-3"></div>

    <div class="container">
        <div class="corner-bracket bracket-tl"></div>
        <div class="corner-bracket bracket-tr"></div>
        <div class="corner-bracket bracket-bl"></div>
        <div class="corner-bracket bracket-br"></div>

        <div class="login-card">
            <div class="status"></div>

            <div class="header">
                <div class="logo">◆ VAULT</div>
                <h1>ACCESS GRANTED</h1>
                <p class="subtitle">Authenticate your credentials</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">User ID</label>
                    <div class="input-wrapper">
                        <input 
                            type="email" 
                            id="email" 
                            placeholder="user@techvault.io"
                            required
                        >
                        <div class="input-glow"></div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Security Key</label>
                    <div class="input-wrapper">
                        <input 
                            type="password" 
                            id="password" 
                            placeholder="••••••••••••••••"
                            required
                        >
                        <div class="input-glow"></div>
                    </div>
                </div>

                <div class="remember-forgot">
                    <div class="checkbox-group">
                        <input type="checkbox" id="remember">
                        <label for="remember" style="margin-bottom: 0; color: var(--text-secondary); text-transform: none; letter-spacing: 0;">Remember this device</label>
                    </div>
                    <a href="#" class="forgot-link">Forgot?</a>
                </div>

                <button type="submit" class="btn-login">⚡ Authenticate</button>
            </form>

            <p class="signup-link">
                New user? <a href="#">Initialize Account</a>
            </p>

            <div class="divider">
                <div class="divider-text">Or Connect Via</div>
            </div>

            <div class="social-login">
                <button class="social-btn" type="button">GitHub</button>
                <button class="social-btn" type="button">Discord</button>
                <button class="social-btn" type="button">MetaMask</button>
            </div>
        </div>
    </div>

    <div class="success-message" id="successMsg">
        <span>✓</span>
        <span>Authentication Successful - Welcome Back</span>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const successMsg = document.getElementById('successMsg');

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (email && password) {
                // Show success message
                successMsg.style.display = 'flex';
                
                // Reset form
                form.reset();
                
                // Hide success message after 4 seconds
                setTimeout(() => {
                    successMsg.style.display = 'none';
                }, 4000);
            }
        });

        // Add glowing effect to inputs on type
        const inputs = document.querySelectorAll('input[type="text"], input[type="email"], input[type="password"]');
        inputs.forEach(input => {
            input.addEventListener('input', function() {
                this.parentElement.style.boxShadow = 
                    '0 0 15px rgba(0, 212, 255, 0.4), inset 0 0 10px rgba(0, 212, 255, 0.05)';
            });
        });

        // Floating particles follow mouse
        document.addEventListener('mousemove', (e) => {
            const particles = document.querySelectorAll('.particle');
            particles.forEach((particle, index) => {
                const speed = 20 + (index * 10);
                const x = (e.clientX / window.innerWidth) * speed;
                const y = (e.clientY / window.innerHeight) * speed;
                particle.style.transform = `translate(${x}px, ${y}px)`;
            });
        });
    </script>
</body>
</html>
