<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2563eb;
            --primary-dark: #1e40af;
            --neutral-50: #f9fafb;
            --neutral-100: #f3f4f6;
            --neutral-300: #d1d5db;
            --neutral-400: #9ca3af;
            --neutral-600: #4b5563;
            --neutral-900: #111827;
            --success: #10b981;
            --error: #ef4444;
        }

        html, body {
            height: 100%;
            width: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            letter-spacing: -0.3px;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            background-attachment: fixed;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Animated background elements */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: drift 20s linear infinite;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes drift {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 48px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 36px;
            animation: fadeInDown 0.8s ease-out;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            width: 48px;
            height: 48px;
            margin: 0 auto 16px;
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: white;
            font-size: 24px;
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.3);
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            color: var(--neutral-900);
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 14px;
            color: var(--neutral-400);
            font-weight: 500;
        }

        .form {
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group:last-of-type {
            margin-bottom: 28px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--neutral-600);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid var(--neutral-200);
            border-radius: 10px;
            font-size: 15px;
            color: var(--neutral-900);
            background: var(--neutral-50);
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input::placeholder {
            color: var(--neutral-300);
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
            transform: translateY(-2px);
        }

        input:hover:not(:focus) {
            border-color: var(--neutral-300);
            background: white;
        }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            font-size: 13px;
        }

        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            padding: 0;
            cursor: pointer;
            accent-color: var(--primary);
        }

        .checkbox-label {
            margin: 0;
            color: var(--neutral-600);
            cursor: pointer;
            user-select: none;
            text-transform: none;
            letter-spacing: normal;
            font-weight: 500;
        }

        a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        a:hover {
            color: var(--primary-dark);
        }

        .btn {
            width: 100%;
            padding: 12px 16px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            color: white;
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.3);
            margin-bottom: 12px;
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }

        .btn-primary:hover::before {
            left: 100%;
        }

        .btn-primary:hover {
            box-shadow: 0 15px 35px rgba(37, 99, 235, 0.4);
            transform: translateY(-2px);
        }

        .btn-primary:active {
            transform: translateY(0);
            box-shadow: 0 5px 15px rgba(37, 99, 235, 0.3);
        }

        .btn-secondary {
            background: var(--neutral-100);
            color: var(--neutral-600);
            border: 1.5px solid var(--neutral-200);
        }

        .btn-secondary:hover {
            background: var(--neutral-50);
            border-color: var(--neutral-300);
            color: var(--neutral-900);
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 28px 0;
            gap: 12px;
            color: var(--neutral-400);
            font-size: 13px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--neutral-200);
        }

        .social-login {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 24px;
        }

        .social-btn {
            padding: 10px;
            border: 1.5px solid var(--neutral-200);
            border-radius: 10px;
            background: var(--neutral-50);
            color: var(--neutral-600);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .social-btn:hover {
            background: white;
            border-color: var(--neutral-300);
            transform: translateY(-1px);
        }

        .signup-link {
            text-align: center;
            font-size: 14px;
            color: var(--neutral-600);
        }

        .signup-link a {
            color: var(--primary);
            font-weight: 600;
        }

        .input-error {
            border-color: var(--error) !important;
            box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.1) !important;
        }

        .error-message {
            font-size: 12px;
            color: var(--error);
            margin-top: 4px;
            display: none;
        }

        .success-message {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid var(--success);
            color: var(--success);
            padding: 12px 14px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 20px;
            animation: slideDown 0.4s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <div class="logo">✓</div>
                <h1>Welcome Back</h1>
                <p class="subtitle">Sign in to your account</p>
            </div>

            <form class="form" id="loginForm">
                <div id="successMessage" class="success-message" style="display: none;">
                    ✓ Successfully logged in!
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input
                        type="email"
                        id="email"
                        placeholder="you@example.com"
                        required
                    >
                    <div class="error-message"></div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input
                        type="password"
                        id="password"
                        placeholder="••••••••"
                        required
                    >
                    <div class="error-message"></div>
                </div>

                <div class="remember-forgot">
                    <div class="checkbox-wrapper">
                        <input type="checkbox" id="remember" name="remember">
                        <label for="remember" class="checkbox-label">Remember me</label>
                    </div>
                    <a href="#forgot">Forgot password?</a>
                </div>

                <button type="submit" class="btn btn-primary">Sign In</button>
                <button type="button" class="btn btn-secondary">Continue with Google</button>

                <div class="divider">or</div>

                <div class="social-login">
                    <button type="button" class="social-btn">
                        <span>f</span> Facebook
                    </button>
                    <button type="button" class="social-btn">
                        <span>𝕏</span> X
                    </button>
                </div>

                <p class="signup-link">
                    Don't have an account? <a href="#signup">Sign up</a>
                </p>
            </form>
        </div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const successMessage = document.getElementById('successMessage');

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            
            // Validate inputs
            let isValid = true;

            if (!emailInput.value.includes('@')) {
                emailInput.classList.add('input-error');
                emailInput.nextElementSibling.textContent = 'Please enter a valid email';
                emailInput.nextElementSibling.style.display = 'block';
                isValid = false;
            } else {
                emailInput.classList.remove('input-error');
                emailInput.nextElementSibling.style.display = 'none';
            }

            if (passwordInput.value.length < 6) {
                passwordInput.classList.add('input-error');
                passwordInput.nextElementSibling.textContent = 'Password must be at least 6 characters';
                passwordInput.nextElementSibling.style.display = 'block';
                isValid = false;
            } else {
                passwordInput.classList.remove('input-error');
                passwordInput.nextElementSibling.style.display = 'none';
            }

            if (isValid) {
                successMessage.style.display = 'block';
                form.reset();
                setTimeout(() => {
                    successMessage.style.display = 'none';
                }, 3000);
            }
        });

        // Clear errors on input
        emailInput.addEventListener('focus', () => {
            emailInput.classList.remove('input-error');
            emailInput.nextElementSibling.style.display = 'none';
        });

        passwordInput.addEventListener('focus', () => {
            passwordInput.classList.remove('input-error');
            passwordInput.nextElementSibling.style.display = 'none';
        });
    </script>
</body>
</html>
