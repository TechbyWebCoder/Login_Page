<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>MobileHub - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --primary-dark: #4f46e5;
            --accent: #ec4899;
            --success: #10b981;
            --bg-light: #f8f9fc;
            --bg-white: #ffffff;
            --text-primary: #1f2937;
            --text-secondary: #6b7280;
            --border: #e5e7eb;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.06);
            --shadow-md: 0 8px 16px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 12px 28px rgba(0, 0, 0, 0.12);
        }

        html, body {
            width: 100%;
            height: 100%;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: linear-gradient(180deg, #f8f9fc 0%, #f0f1f6 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            color: var(--text-primary);
        }

        /* Decorative background elements */
        .bg-decoration {
            position: fixed;
            border-radius: 50%;
            opacity: 0.08;
            pointer-events: none;
            z-index: 0;
        }

        .decoration-1 {
            width: 200px;
            height: 200px;
            background: var(--primary);
            top: -50px;
            right: -50px;
            animation: float 10s ease-in-out infinite;
        }

        .decoration-2 {
            width: 150px;
            height: 150px;
            background: var(--accent);
            bottom: -30px;
            left: -30px;
            animation: float 12s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% {
                transform: translate(0, 0);
            }
            50% {
                transform: translate(20px, 20px);
            }
        }

        .mobile-frame {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 390px;
            height: 844px;
            background: var(--bg-white);
            border-radius: 40px;
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            animation: slideUp 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Status bar area */
        .status-bar {
            height: 50px;
            background: linear-gradient(180deg, var(--bg-white) 0%, rgba(248, 249, 252, 0.5) 100%);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .status-left, .status-right {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .status-center {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .status-indicators {
            display: flex;
            gap: 4px;
            font-size: 10px;
        }

        /* Main content area */
        .login-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 40px 24px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .header-section {
            margin-bottom: 36px;
            animation: fadeInDown 0.8s ease-out 0.1s both;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .app-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-md);
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-6px);
            }
        }

        h1 {
            font-family: 'Sora', sans-serif;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .tagline {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        /* Form section */
        .form-section {
            flex: 1;
            margin-bottom: 20px;
            animation: fadeInUp 0.8s ease-out 0.15s both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg-light);
            border: 1.5px solid var(--border);
            border-radius: 12px;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            color: var(--text-primary);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }

        input::placeholder {
            color: var(--text-secondary);
            opacity: 0.7;
        }

        input:focus {
            border-color: var(--primary);
            background: var(--bg-white);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
            transform: translateY(-2px);
        }

        input:focus::placeholder {
            opacity: 0.4;
        }

        /* Password visibility toggle */
        .password-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            color: var(--text-secondary);
            transition: color 0.2s ease;
            padding: 4px;
        }

        .password-toggle:active {
            color: var(--primary);
        }

        .forgot-password {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            animation: fadeIn 0.8s ease-out 0.2s both;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .remember-checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--primary);
        }

        .checkbox-label {
            font-size: 13px;
            color: var(--text-primary);
            font-weight: 500;
            cursor: pointer;
        }

        .forgot-link {
            font-size: 13px;
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .forgot-link:active {
            opacity: 0.7;
        }

        /* Login button */
        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: var(--bg-white);
            border: none;
            border-radius: 12px;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: var(--shadow-md);
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
            animation: fadeIn 0.8s ease-out 0.25s both;
        }

        .btn-login::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.2);
            transition: left 0.5s ease;
        }

        .btn-login:active::before {
            left: 100%;
        }

        .btn-login:active {
            transform: scale(0.98);
            box-shadow: var(--shadow-sm);
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 24px 0;
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            animation: fadeIn 0.8s ease-out 0.3s both;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* Social login buttons */
        .social-login {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
            animation: fadeIn 0.8s ease-out 0.35s both;
        }

        .social-btn {
            padding: 14px 12px;
            background: var(--bg-light);
            border: 1.5px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-appearance: none;
            appearance: none;
        }

        .social-btn:active {
            background: var(--bg-white);
            border-color: var(--primary);
            transform: scale(0.96);
            box-shadow: var(--shadow-sm);
        }

        /* Signup link */
        .signup-section {
            text-align: center;
            padding-bottom: 20px;
            animation: fadeIn 0.8s ease-out 0.4s both;
        }

        .signup-text {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .signup-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 700;
            transition: color 0.2s ease;
        }

        .signup-link:active {
            opacity: 0.7;
        }

        /* Success state */
        .success-toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--success);
            color: var(--bg-white);
            padding: 12px 20px;
            border-radius: 12px;
            display: none;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            font-weight: 600;
            z-index: 1000;
            animation: slideUpToast 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: var(--shadow-lg);
        }

        @keyframes slideUpToast {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        /* Responsive - mobile-first design */
        @media (max-width: 600px) {
            .mobile-frame {
                max-width: 100%;
                height: 100vh;
                border-radius: 0;
                box-shadow: none;
            }

            .login-content {
                padding: 32px 20px;
            }

            h1 {
                font-size: 26px;
            }
        }

        /* Tablet and desktop */
        @media (min-width: 601px) {
            body {
                padding: 20px;
            }

            .mobile-frame {
                box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            }
        }

        /* Safe area support for notched devices */
        @supports (padding: max(0px)) {
            .status-bar {
                padding-top: max(0px, env(safe-area-inset-top));
                padding-left: max(20px, env(safe-area-inset-left));
                padding-right: max(20px, env(safe-area-inset-right));
            }

            .login-content {
                padding-left: max(24px, env(safe-area-inset-left));
                padding-right: max(24px, env(safe-area-inset-right));
                padding-bottom: max(20px, env(safe-area-inset-bottom));
            }
        }
    </style>
</head>
<body>
    <div class="bg-decoration decoration-1"></div>
    <div class="bg-decoration decoration-2"></div>

    <div class="mobile-frame">
        <!-- Status Bar -->
        <div class="status-bar">
            <div class="status-left">9:41</div>
            <div class="status-center">MobileHub</div>
            <div class="status-right">
                <span class="status-indicators">📶 📡 🔋</span>
            </div>
        </div>

        <!-- Main Content -->
        <div class="login-content">
            <div class="header-section">
                <div class="app-icon">🚀</div>
                <h1>Welcome Back</h1>
                <p class="tagline">Sign in to access your account and continue your journey with us</p>
            </div>

            <form id="loginForm" class="form-section">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <input 
                            type="email" 
                            id="email" 
                            placeholder="you@example.com"
                            required
                            autocomplete="email"
                        >
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <input 
                            type="password" 
                            id="password" 
                            placeholder="••••••••"
                            required
                            autocomplete="current-password"
                        >
                        <button class="password-toggle" type="button" id="togglePassword">👁️</button>
                    </div>
                </div>

                <div class="forgot-password">
                    <div class="remember-checkbox">
                        <input type="checkbox" id="remember">
                        <label for="remember" class="checkbox-label">Remember me</label>
                    </div>
                    <a href="#" class="forgot-link">Forgot?</a>
                </div>

                <button type="submit" class="btn-login">Sign In</button>
            </form>

            <div class="divider">Or continue with</div>

            <div class="social-login">
                <button class="social-btn" type="button" title="Google">G</button>
                <button class="social-btn" type="button" title="Apple">🍎</button>
                <button class="social-btn" type="button" title="Facebook">f</button>
            </div>

            <div class="signup-section">
                <p class="signup-text">
                    Don't have an account? <a href="#" class="signup-link">Sign up</a>
                </p>
            </div>
        </div>
    </div>

    <div class="success-toast" id="successToast">
        <span>✓</span>
        <span>Logged in successfully!</span>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const togglePasswordBtn = document.getElementById('togglePassword');
        const successToast = document.getElementById('successToast');
        const socialBtns = document.querySelectorAll('.social-btn');

        // Password visibility toggle
        togglePasswordBtn.addEventListener('click', function(e) {
            e.preventDefault();
            const isPassword = passwordInput.type === 'password';
            passwordInput.type = isPassword ? 'text' : 'password';
            togglePasswordBtn.textContent = isPassword ? '👁️‍🗨️' : '👁️';
        });

        // Form submission
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            if (emailInput.value && passwordInput.value) {
                successToast.style.display = 'flex';
                form.reset();
                togglePasswordBtn.textContent = '👁️';
                passwordInput.type = 'password';
                
                setTimeout(() => {
                    successToast.style.display = 'none';
                }, 3000);
            }
        });

        // Social button handlers
        socialBtns.forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.preventDefault();
            });
        });

        // Focus management for better mobile experience
        emailInput.addEventListener('blur', function() {
            if (this.value) {
                this.style.boxShadow = 'none';
            }
        });

        passwordInput.addEventListener('blur', function() {
            if (this.value) {
                this.style.boxShadow = 'none';
            }
        });

        // Prevent zoom on input focus (iOS)
        document.addEventListener('touchmove', function(e) {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON') {
                return true;
            }
        }, false);
    </script>
</body>
</html>
