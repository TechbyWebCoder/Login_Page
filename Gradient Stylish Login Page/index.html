<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ColorFlow - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gradient-1: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --gradient-2: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --gradient-3: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            --gradient-4: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            --gradient-5: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            --text-primary: #2d3748;
            --text-secondary: #718096;
            --white: #ffffff;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        @keyframes gradientBG {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        /* Floating shapes background */
        .shape {
            position: absolute;
            border-radius: 50%;
            opacity: 0.15;
            pointer-events: none;
            z-index: 0;
        }

        .shape-1 {
            width: 250px;
            height: 250px;
            background: var(--white);
            top: 10%;
            left: 10%;
            animation: float 8s ease-in-out infinite;
        }

        .shape-2 {
            width: 180px;
            height: 180px;
            background: var(--white);
            top: 60%;
            right: 15%;
            animation: float 10s ease-in-out infinite reverse;
        }

        .shape-3 {
            width: 200px;
            height: 200px;
            background: var(--white);
            bottom: 10%;
            left: 20%;
            animation: float 12s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translate(0, 0) scale(1);
            }
            50% {
                transform: translate(40px, 40px) scale(1.1);
            }
        }

        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 460px;
            padding: 20px;
        }

        /* Login card */
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 50px 45px;
            box-shadow: 
                0 8px 32px rgba(31, 38, 135, 0.2),
                0 0 1px rgba(31, 38, 135, 0.1);
            animation: slideUp 0.9s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 8px;
            background: var(--gradient-5);
            border-radius: 30px 30px 0 0;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            margin-bottom: 40px;
            text-align: center;
            animation: fadeInDown 0.9s ease-out 0.1s both;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .welcome-badge {
            display: inline-block;
            background: var(--gradient-3);
            color: var(--white);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
            animation: bounceIn 0.9s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s both;
        }

        @keyframes bounceIn {
            0% {
                transform: scale(0.3);
                opacity: 0;
            }
            50% {
                opacity: 1;
            }
            70% {
                transform: scale(1.05);
            }
            100% {
                transform: scale(1);
            }
        }

        h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 34px;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 24px;
            animation: fadeInUp 0.9s ease-out both;
            position: relative;
        }

        .form-group:nth-child(1) { animation-delay: 0.2s; }
        .form-group:nth-child(2) { animation-delay: 0.25s; }
        .form-group:nth-child(3) { animation-delay: 0.3s; }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .input-wrapper {
            position: relative;
            height: 56px;
        }

        input {
            width: 100%;
            height: 100%;
            padding: 16px 18px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border: none;
            border-radius: 14px;
            font-family: 'Quicksand', sans-serif;
            font-size: 15px;
            color: var(--text-primary);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            outline: none;
            font-weight: 600;
        }

        input::placeholder {
            color: transparent;
        }

        /* Floating label */
        label {
            position: absolute;
            top: 16px;
            left: 18px;
            font-size: 15px;
            font-weight: 600;
            color: var(--text-secondary);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            pointer-events: none;
            z-index: 1;
        }

        input:focus {
            background: linear-gradient(135deg, #ffffff 0%, #f5f7fa 100%);
            box-shadow: 
                0 0 0 3px rgba(102, 126, 234, 0.1),
                0 8px 16px rgba(102, 126, 234, 0.15);
            transform: translateY(-2px);
        }

        input:focus + label,
        input:not(:placeholder-shown) + label {
            transform: translateY(-28px) scale(0.85);
            color: #667eea;
            font-weight: 700;
        }

        input:focus + label {
            background: var(--white);
            padding: 0 8px;
        }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            font-size: 13px;
            animation: fadeIn 0.9s ease-out 0.35s both;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #667eea;
            border-radius: 4px;
        }

        .checkbox-label {
            color: var(--text-primary);
            font-weight: 600;
            cursor: pointer;
        }

        .forgot-link {
            color: #667eea;
            text-decoration: none;
            font-weight: 700;
            transition: all 0.3s ease;
            position: relative;
        }

        .forgot-link::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--gradient-1);
            transition: width 0.3s ease;
        }

        .forgot-link:hover::after {
            width: 100%;
        }

        .forgot-link:hover {
            color: #764ba2;
        }

        /* Gradient button */
        .btn-submit {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-family: 'Montserrat', sans-serif;
            font-size: 15px;
            font-weight: 700;
            color: var(--white);
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            margin-bottom: 18px;
            position: relative;
            overflow: hidden;
            animation: fadeIn 0.9s ease-out 0.4s both;
            background-size: 200% 200%;
            background-position: 0% 0%;
        }

        .btn-submit {
            background: var(--gradient-1);
        }

        .btn-submit::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--gradient-2);
            opacity: 0;
            transition: opacity 0.5s ease;
            z-index: -1;
        }

        .btn-submit:hover {
            transform: translateY(-4px);
            box-shadow: 
                0 12px 30px rgba(102, 126, 234, 0.4),
                0 0 1px rgba(102, 126, 234, 0.2);
            letter-spacing: 1.5px;
        }

        .btn-submit:hover::before {
            opacity: 1;
        }

        .btn-submit:active {
            transform: translateY(-2px);
        }

        /* Alternative button colors on hover states */
        .btn-submit:nth-of-type(1):hover {
            background: var(--gradient-2);
        }

        .divider {
            position: relative;
            margin: 28px 0;
            text-align: center;
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            animation: fadeIn 0.9s ease-out 0.45s both;
        }

        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 42%;
            height: 1px;
            background: linear-gradient(90deg, transparent, #e2e8f0, transparent);
        }

        .divider::before {
            left: 0;
        }

        .divider::after {
            right: 0;
        }

        .social-login {
            display: flex;
            gap: 14px;
            margin-bottom: 20px;
            animation: fadeIn 0.9s ease-out 0.5s both;
        }

        .social-btn {
            flex: 1;
            padding: 14px;
            border: 2px solid #e2e8f0;
            background: var(--white);
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .social-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.5), transparent);
            transition: left 0.5s ease;
        }

        .social-btn:hover::before {
            left: 100%;
        }

        .social-btn:nth-child(1) {
            border-color: #667eea;
            color: #667eea;
        }

        .social-btn:nth-child(1):hover {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: var(--white);
            border-color: transparent;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }

        .social-btn:nth-child(2) {
            border-color: #f093fb;
            color: #f093fb;
        }

        .social-btn:nth-child(2):hover {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: var(--white);
            border-color: transparent;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(240, 147, 251, 0.3);
        }

        .social-btn:nth-child(3) {
            border-color: #43e97b;
            color: #43e97b;
        }

        .social-btn:nth-child(3):hover {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            color: var(--white);
            border-color: transparent;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(67, 233, 123, 0.3);
        }

        .signup-link {
            text-align: center;
            font-size: 13px;
            color: var(--text-secondary);
            animation: fadeIn 0.9s ease-out 0.55s both;
        }

        .signup-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 700;
            transition: all 0.3s ease;
            position: relative;
        }

        .signup-link a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--gradient-1);
            transition: width 0.3s ease;
        }

        .signup-link a:hover::after {
            width: 100%;
        }

        .signup-link a:hover {
            color: #764ba2;
        }

        .success-message {
            position: fixed;
            top: 30px;
            right: 30px;
            background: var(--white);
            padding: 16px 28px;
            border-radius: 12px;
            display: none;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            z-index: 1000;
            animation: slideIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.2);
            font-size: 14px;
        }

        .success-message::before {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--gradient-4);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.3);
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(100px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-card {
                padding: 40px 30px;
                border-radius: 24px;
            }

            h1 {
                font-size: 28px;
            }

            .social-login {
                flex-direction: column;
            }

            .container {
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div> 

    <div class="container">
        <div class="login-card">
            <div class="header">
                <div class="welcome-badge">✨ Welcome Back</div>
                <h1>ColorFlow</h1>
                <p class="subtitle">Sign in to your account</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <div class="input-wrapper">
                        <input 
                            type="email" 
                            id="email" 
                            placeholder="your@email.com"
                            required
                        >
                        <label for="email">Email Address</label>
                    </div>
                </div>

                <div class="form-group">
                    <div class="input-wrapper">
                        <input 
                            type="password" 
                            id="password" 
                            placeholder="••••••••"
                            required
                        >
                        <label for="password">Password</label>
                    </div>
                </div>

                <div class="remember-forgot">
                    <div class="checkbox-group">
                        <input type="checkbox" id="remember">
                        <label for="remember" class="checkbox-label">Remember me</label>
                    </div>
                    <a href="#" class="forgot-link">Forgot?</a>
                </div>

                <button type="submit" class="btn-submit">Sign In</button>
            </form>

            <div class="divider">Or continue with</div>

            <div class="social-login">
                <button class="social-btn" type="button" title="Google">G</button>
                <button class="social-btn" type="button" title="Apple">🍎</button>
                <button class="social-btn" type="button" title="GitHub">⌘</button>
            </div>

            <p class="signup-link">
                Don't have an account? <a href="#">Sign up</a>
            </p>
        </div>
    </div>

    <div class="success-message" id="successMsg">
        <span>Successfully logged in!</span>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const successMsg = document.getElementById('successMsg');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            if (emailInput.value && passwordInput.value) {
                successMsg.style.display = 'flex';
                form.reset();
                
                setTimeout(() => {
                    successMsg.style.display = 'none';
                }, 3500);
            }
        });

        // Prevent default on social buttons
        document.querySelectorAll('.social-btn').forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.preventDefault();
            });
        });

        // Add floating label animation on input
        [emailInput, passwordInput].forEach(input => {
            input.addEventListener('input', function() {
                if (this.value.length > 0) {
                    this.style.background = 'linear-gradient(135deg, #ffffff 0%, #f5f7fa 100%)';
                } else {
                    this.style.background = 'linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%)';
                }
            });
        });
    </script>
</body>
</html>
