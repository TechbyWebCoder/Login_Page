<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glassmorphism Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --primary-dark: #4f46e5;
            --accent: #ec4899;
            --text-dark: #1f2937;
            --text-light: #6b7280;
            --text-lighter: #9ca3af;
            --glass-light: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #4facfe 75%, #00f2fe 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        @keyframes gradientShift {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        /* Decorative blurred shapes */
        .bg-decoration {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            z-index: 0;
        }

        .decoration-1 {
            width: 300px;
            height: 300px;
            background: rgba(255, 255, 255, 0.5);
            top: -100px;
            left: -100px;
            animation: float 20s ease-in-out infinite;
        }

        .decoration-2 {
            width: 250px;
            height: 250px;
            background: rgba(255, 255, 255, 0.4);
            bottom: -50px;
            right: -50px;
            animation: float 25s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% {
                transform: translate(0, 0);
            }
            50% {
                transform: translate(50px, 50px);
            }
        }

        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 480px;
            padding: 20px;
        }

        /* Glassmorphism card */
        .glass-card {
            background: var(--glass-light);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 50px 45px;
            box-shadow: 
                0 8px 32px 0 rgba(31, 38, 135, 0.2),
                0 4px 12px 0 rgba(31, 38, 135, 0.1),
                inset 0 1px 0 0 rgba(255, 255, 255, 0.6);
            animation: slideUp 0.9s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Subtle shine effect */
        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.8), transparent);
            border-radius: 24px 24px 0 0;
        }

        .header {
            margin-bottom: 40px;
            text-align: center;
            animation: fadeInDown 0.9s ease-out 0.1s both;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(99, 102, 241, 0.15);
            color: var(--primary-dark);
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border: 1px solid rgba(99, 102, 241, 0.3);
        }

        .badge::before {
            content: '●';
            font-size: 8px;
            animation: pulse-dot 2s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.4;
            }
        }

        h1 {
            font-family: 'Lora', serif;
            font-size: 32px;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-light);
            font-weight: 400;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 22px;
            animation: fadeInUp 0.9s ease-out both;
        }

        .form-group:nth-child(1) { animation-delay: 0.2s; }
        .form-group:nth-child(2) { animation-delay: 0.25s; }
        .form-group:nth-child(3) { animation-delay: 0.3s; }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .input-wrapper {
            position: relative;
        }

        input {
            width: 100%;
            padding: 13px 16px;
            background: rgba(255, 255, 255, 0.5);
            border: 1.5px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 14px;
            color: var(--text-dark);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            outline: none;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        input::placeholder {
            color: rgba(107, 114, 128, 0.5);
        }

        input:focus {
            border-color: rgba(255, 255, 255, 0.6);
            background: rgba(255, 255, 255, 0.8);
            box-shadow: 
                0 0 0 3px rgba(99, 102, 241, 0.1),
                0 8px 16px rgba(99, 102, 241, 0.15);
            transform: translateY(-2px);
        }

        input:focus::placeholder {
            color: rgba(107, 114, 128, 0.3);
        }

        /* Floating label effect */
        input:not(:placeholder-shown) ~ label,
        input:focus ~ label {
            transform: translateY(-1.5em) scale(0.85);
        }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            font-size: 13px;
            animation: fadeIn 0.9s ease-out 0.35s both;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--primary);
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        input[type="checkbox"]:hover {
            box-shadow: 0 0 8px rgba(99, 102, 241, 0.4);
        }

        .checkbox-label {
            color: var(--text-dark);
            font-weight: 500;
        }

        .forgot-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            position: relative;
        }

        .forgot-link::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 1.5px;
            background: var(--accent);
            transition: width 0.3s ease;
        }

        .forgot-link:hover::after {
            width: 100%;
        }

        .forgot-link:hover {
            color: var(--accent);
        }

        .btn-login {
            width: 100%;
            padding: 14px 16px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 
                0 8px 24px rgba(99, 102, 241, 0.35),
                0 4px 8px rgba(99, 102, 241, 0.2);
            margin-bottom: 18px;
            position: relative;
            overflow: hidden;
            animation: fadeIn 0.9s ease-out 0.4s both;
            letter-spacing: 0.5px;
        }

        .btn-login::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn-login:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 
                0 12px 32px rgba(99, 102, 241, 0.45),
                0 6px 12px rgba(99, 102, 241, 0.3);
        }

        .btn-login:active {
            transform: translateY(-1px);
        }

        .divider {
            position: relative;
            margin: 28px 0;
            animation: fadeIn 0.9s ease-out 0.45s both;
        }

        .divider-line {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(31, 38, 135, 0.2), transparent);
        }

        .divider-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--glass-light);
            padding: 0 12px;
            font-size: 12px;
            color: var(--text-lighter);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            backdrop-filter: blur(10px);
        }

        .social-login {
            display: flex;
            gap: 12px;
            animation: fadeIn 0.9s ease-out 0.5s both;
        }

        .social-btn {
            flex: 1;
            padding: 12px;
            background: rgba(255, 255, 255, 0.4);
            border: 1.5px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: var(--text-dark);
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 0.5px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .social-btn:hover {
            background: rgba(255, 255, 255, 0.6);
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow: 
                0 8px 24px rgba(99, 102, 241, 0.2),
                0 4px 8px rgba(99, 102, 241, 0.1);
            transform: translateY(-2px);
        }

        .signup-link {
            text-align: center;
            font-size: 13px;
            color: var(--text-light);
            animation: fadeIn 0.9s ease-out 0.55s both;
            margin-top: 18px;
        }

        .signup-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 700;
            transition: all 0.3s ease;
            position: relative;
        }

        .signup-link a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--accent);
            transition: width 0.3s ease;
        }

        .signup-link a:hover::after {
            width: 100%;
        }

        .signup-link a:hover {
            color: var(--accent);
        }

        .success-message {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 16px 28px;
            border-radius: 12px;
            display: none;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            color: #10b981;
            z-index: 1000;
            animation: slideDown 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 8px 24px rgba(16, 185, 129, 0.2);
            font-size: 14px;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .glass-card {
                padding: 40px 30px;
                border-radius: 20px;
            }

            h1 {
                font-size: 28px;
            }

            .container {
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-decoration decoration-1"></div>
    <div class="bg-decoration decoration-2"></div>

    <div class="container">
        <div class="glass-card">
            <div class="header">
                <div class="badge">Welcome Back</div>
                <h1>Sign In</h1>
                <p class="subtitle">Access your account with your credentials</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <input 
                            type="email" 
                            id="email" 
                            placeholder="you@example.com"
                            required
                        >
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <input 
                            type="password" 
                            id="password" 
                            placeholder="••••••••"
                            required
                        >
                    </div>
                </div>

                <div class="remember-forgot">
                    <div class="checkbox-group">
                        <input type="checkbox" id="remember">
                        <label for="remember" class="checkbox-label">Remember me</label>
                    </div>
                    <a href="#" class="forgot-link">Forgot?</a>
                </div>

                <button type="submit" class="btn-login">Sign In</button>
            </form>

            <div class="divider">
                <div class="divider-line"></div>
                <div class="divider-text">Or continue with</div>
            </div>

            <div class="social-login">
                <button class="social-btn" type="button">Google</button>
                <button class="social-btn" type="button">Apple</button>
                <button class="social-btn" type="button">Microsoft</button>
            </div>

            <p class="signup-link">
                Don't have an account? <a href="#">Create one</a>
            </p>
        </div>
    </div>

    <div class="success-message" id="successMsg">
        <span>✓</span>
        <span>Welcome back! Redirecting...</span>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const successMsg = document.getElementById('successMsg');

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (email && password) {
                successMsg.style.display = 'flex';
                form.reset();
                
                setTimeout(() => {
                    successMsg.style.display = 'none';
                }, 3500);
            }
        });

        // Add smooth interaction feedback
        const socialBtns = document.querySelectorAll('.social-btn');
        socialBtns.forEach(btn => {
            btn.addEventListener('mousedown', function() {
                this.style.transform = 'translateY(0px)';
            });
            btn.addEventListener('mouseup', function() {
                this.style.transform = 'translateY(-2px)';
            });
        });
    </script>
</body>
</html>
